<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
</head>
<body>

    <header>
        <h1>Weather App</h1>
    </header>

    <main>

        <form id="search-form">

            <input
                type="text"
                id="location-input"
                placeholder="Enter a city..."
                required
            >

            <button type="submit">
                Search
            </button>

        </form>

        <div id="loading">
            Loading...
        </div>

        <div id="weather-container">

        </div>

    </main>

</body>
</html>
